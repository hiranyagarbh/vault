<html lang="en">
<head>

    <title>Unit Converter</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }

        button { padding: 10px; background: blue; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result-box { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; margin-top: 40px;}
        .center-btn { display: block; margin: 0 auto; }
    </style>
